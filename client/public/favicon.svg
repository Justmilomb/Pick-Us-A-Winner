  <rect width="32" height="32" fill="#6D28D9" stroke="#000000" stroke-width="2"/>

  <!-- White gift box icon (present with ribbon) -->
  <g transform="translate(2, 2)" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Gift box body -->
    <path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7"></path>
    <!-- Gift box top -->
    <path d="M4 10a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2"></path>
    <!-- Ribbon horizontal -->
    <line x1="2" y1="10" x2="20" y2="10"></line>
    <!-- Ribbon vertical -->
    <line x1="12" y1="2" x2="12" y2="20"></line>
    <!-- Bow top left -->
    <circle cx="8" cy="6" r="2"></circle>
    <!-- Bow top right -->
    <circle cx="16" cy="6" r="2"></circle>
  </g>
</svg>
